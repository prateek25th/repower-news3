<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g900:#1B5E20;--g800:#2E7D32;--g600:#388E3C;
  --g100:#C8E6C9;--g50:#E8F5E9;
  --t1:#1a1a1a;--t2:#333;--t3:#777;
  --bdr:#e0e0e0;--card:#fff;
}
html,body{height:100%;width:100%;overflow:hidden;background:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;width:100%;max-width:640px;margin:0 auto;background:#f4f6f4}

/* ── Header ── */
.hdr{flex-shrink:0;background:var(--g900);box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 7px}
.logo{display:flex;align-items:center;gap:7px;color:#fff;font-size:16px}
.logo strong{font-weight:800}
.hright{display:flex;align-items:center;gap:8px}
.live{width:7px;height:7px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(76,175,80,.5)}70%{box-shadow:0 0 0 5px rgba(76,175,80,0)}100%{box-shadow:0 0 0 0 rgba(76,175,80,0)}}
.ibtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ibtn:active{background:rgba(255,255,255,.25)}
.spin svg{animation:rot .6s linear}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── Tabs ── */
.tabs{display:flex;border-top:1px solid rgba(255,255,255,.1)}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 4px;background:none;border:none;border-bottom:2.5px solid transparent;color:rgba(255,255,255,.5);font-size:10.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.on{color:#fff;border-bottom-color:var(--g100)}

/* ── Counter ── */
.counter{flex-shrink:0;background:#fff;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:5px 14px;font-size:11px;color:var(--t3)}
.cdots{display:flex;gap:4px;align-items:center}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--bdr);transition:all .2s}
.cdot.on{background:var(--g800);width:14px;border-radius:3px}

/* ── Card area ── */
.card-wrap{flex:1;overflow:hidden;position:relative}

/* ── Card animation ── */
.card{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  background:var(--card);
  transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .35s;
}
.card.exit-up   {transform:translateY(-100%);opacity:0;pointer-events:none}
.card.enter-down{transform:translateY(100%); opacity:0;pointer-events:none}
.card.active    {transform:translateY(0);    opacity:1}

/* ── Image (same for all 3 tabs) ── */
.card-img{
  width:100%;height:44%;
  flex-shrink:0;position:relative;
  overflow:hidden;background:#1a2a1a;
}
.card-img img{
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .6s;display:block;
}
.card-img img.vis{opacity:1}
.img-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.68))}
.badge-cat{
  position:absolute;top:10px;left:10px;
  background:var(--g900);color:#fff;
  font-size:9px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.5px;z-index:2;
}
.badge-src{
  position:absolute;bottom:9px;left:10px;
  font-size:9px;font-weight:700;color:#fff;
  background:rgba(27,94,32,.9);
  padding:3px 8px;border-radius:20px;z-index:2;
}
.badge-meta{
  position:absolute;bottom:9px;right:10px;
  display:flex;gap:4px;z-index:2;
}
.badge-meta span{
  font-size:9px;color:rgba(255,255,255,.92);
  background:rgba(0,0,0,.42);padding:2px 7px;border-radius:20px;
}
.badge-diff{
  position:absolute;top:10px;right:10px;
  font-size:9px;font-weight:700;
  padding:3px 9px;border-radius:20px;z-index:2;
}
.diff-beg{background:#1565C0;color:#fff}
.diff-int{background:#E65100;color:#fff}
.diff-adv{background:#B71C1C;color:#fff}

/* ── Card body ── */
.card-body{
  flex:1;overflow-y:auto;
  padding:14px 15px 10px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;
}
.card-body::-webkit-scrollbar{width:3px}
.card-body::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

.c-headline{font-size:15px;font-weight:800;color:var(--t1);line-height:1.4}
.c-summary{font-size:13.5px;color:var(--t2);line-height:1.78}

/* ── Learning concept blocks ── */
.cblock{background:#f7faf7;border-radius:10px;padding:11px 13px;border:0.5px solid var(--bdr)}
.cblock-title{font-size:12px;font-weight:700;color:var(--g800);margin-bottom:4px}
.cblock-text{font-size:13px;color:var(--t2);line-height:1.7}

/* ── Stats chips ── */
.stats-row{display:flex;flex-wrap:wrap;gap:5px}
.stat-chip{font-size:10.5px;font-weight:600;color:#fff;background:var(--g800);padding:3px 9px;border-radius:20px}

/* ── Read more button ── */
.btn-read{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;
  color:var(--g800);background:var(--g50);
  padding:8px 15px;border-radius:24px;
  text-decoration:none;border:1px solid var(--g100);
  align-self:flex-start;flex-shrink:0;
}
.btn-read:active{background:var(--g100)}

/* ── Card footer ── */
.c-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:0.5px solid var(--bdr);
  flex-shrink:0;margin-top:auto;
}
.vbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.vdot{width:5px;height:5px;border-radius:50%}
.vhi{background:#E8F5E9;color:#2E7D32}.vhi .vdot{background:#4CAF50}
.vmd{background:#FFF8E1;color:#E65100}.vmd .vdot{background:#FF9800}
.swipe-hint{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px}

/* ── Load more ── */
.loadmore{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#f7faf7;gap:14px;
  transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .35s;
}
.loadmore.exit-up   {transform:translateY(-100%);opacity:0;pointer-events:none}
.loadmore.enter-down{transform:translateY(100%); opacity:0;pointer-events:none}
.loadmore.active    {transform:translateY(0);    opacity:1}
.lm-emoji{font-size:44px}
.lm-title{font-size:16px;font-weight:700;color:var(--t1)}
.lm-sub{font-size:13px;color:var(--t3);text-align:center;max-width:240px;line-height:1.6}
.lm-btn{background:var(--g900);color:#fff;border:none;padding:13px 32px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer}

/* ── Nav ── */
.nav-btns{display:flex;border-top:0.5px solid var(--bdr);flex-shrink:0;background:#fff}
.nb{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;background:#fff;border:none;
  font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:background .15s;
}
.nb:first-child{border-right:0.5px solid var(--bdr)}
.nb:not(:disabled):hover,.nb:not(:disabled):active{background:var(--g50);color:var(--g800)}
.nb:disabled{opacity:.3;cursor:default}

/* ── Sources bar ── */
.src-bar{flex-shrink:0;background:#fafafa;border-top:0.5px solid var(--bdr);padding:5px 12px;overflow-x:auto;scrollbar-width:none;white-space:nowrap}
.src-bar::-webkit-scrollbar{display:none}
.src-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-right:6px}
.src-pill{display:inline-block;font-size:9px;color:var(--t2);background:#fff;border:0.5px solid var(--bdr);padding:2px 7px;border-radius:20px;margin-right:3px}

/* ── Skeleton ── */
.sk-card{position:absolute;inset:0;display:flex;flex-direction:column;background:#fff}
.sk-img{width:100%;height:44%;background:#ddd;position:relative;overflow:hidden;flex-shrink:0}
.sk-img::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.5) 50%,transparent 75%);background-size:300% 100%;animation:shim 1.4s infinite}
.sk-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px}
.sk-line{height:13px;border-radius:5px;background:linear-gradient(90deg,#ececec 25%,#d8d8d8 50%,#ececec 75%);background-size:300% 100%;animation:shim 1.4s infinite}
.sk-s{width:30%}.sk-l{width:100%}.sk-m{width:65%}.sk-xl{width:100%;height:56px}
@keyframes shim{0%{background-position:100% 50%}100%{background-position:-100% 50%}}

/* ── Error ── */
.err-card{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#fff;padding:24px;text-align:center;gap:12px;
}
.err-emoji{font-size:38px}
.err-title{font-size:15px;font-weight:700;color:var(--t1)}
.err-msg{font-size:12.5px;color:var(--t3);line-height:1.65;max-width:270px}
.err-retry{background:var(--g900);color:#fff;border:none;padding:11px 26px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer}

/* ── File:// warning ── */
.file-warn{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#fff;padding:24px;text-align:center;gap:12px;

.file-warn h3{font-size:15px;font-weight:700;color:#B71C1C}
.file-warn p{font-size:13px;color:var(--t2);line-height:1.7;max-width:280px}
.file-warn code{background:#f4f4f4;padding:2px 7px;border-radius:5px;font-size:12px}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;font-size:12px;padding:8px 16px;border-radius:24px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  return `https://images.unsplash.com/photo-${id}?w=900&h=500&fit=crop&auto=format&q=80`;
}

// ── State ─────────────────────────────────────────────────
let curTab    = 'industry';
let tabLoading = {}; // per-tab loading flag — fixes stuck loading bug
let cache     = {};
let arts      = [];
let learnArts = [];
let curIdx    = 0;
let startY    = 0;
let learnUsed = [];

const $wrap   = document.getElementById('cardWrap');
const $cText  = document.getElementById('cText');
const $cDots  = document.getElementById('cDots');
const $prev   = document.getElementById('prevBtn');
const $next   = document.getElementById('nextBtn');
const $toast  = document.getElementById('toast');

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Check if running from file:// — show warning
  if (location.protocol === 'file:') {
    showFileWarning();
    return;
  }

  document.querySelectorAll('.tab').forEach(b =>
    b.addEventListener('click', () => switchTab(b.dataset.t)));

  document.getElementById('rfBtn').addEventListener('click', () => {
    const b = document.getElementById('rfBtn');
    b.classList.add('spin');
    setTimeout(() => b.classList.remove('spin'), 700);
    if (curTab === 'learn') {
      loadLearn(true);
    } else {
      delete cache[curTab];
      loadTab(curTab);
    }
  });

  $prev.addEventListener('click', () => nav(-1));
  $next.addEventListener('click', () => nav(1));
  $wrap.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive:true});
  $wrap.addEventListener('touchend', e => {
    const diff = startY - e.changedTouches[0].clientY;
    if (Math.abs(diff) > 50) nav(diff > 0 ? 1 : -1);
  }, {passive:true});
  document.addEventListener('keydown', e => {
    if (e.key==='ArrowDown'||e.key==='ArrowRight') nav(1);
    if (e.key==='ArrowUp'  ||e.key==='ArrowLeft')  nav(-1);
  });

  loadTab('industry');
});

// ── Tab switch ────────────────────────────────────────────
function switchTab(t) {
  if (t === curTab) return;
  curTab = t;
  curIdx = 0;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));

  if (t === 'learn') {
    if (learnArts.length > 0) {
      arts = learnArts;
      showCardAt(0, 'enter-down', 'learn');
      updCounter(`1 of ${arts.length}`, 0);
      $prev.disabled = true;
      $next.disabled = false;
    } else {
      loadLearn(false);
    }
  } else {
    if (cache[t] && (Date.now() - cache[t].ts) < CACHE_MS) {
      arts = cache[t].data;
      showCardAt(0, 'enter-down', 'news');
      updCounter(`1 of ${arts.length}`, 0);
      $prev.disabled = true;
      $next.disabled = arts.length <= 1;
    } else {
      loadTab(t);
    }
  }
}

// ── Load news / tech ──────────────────────────────────────
async function loadTab(tab) {
  if (tabLoading[tab]) return; // per-tab lock
  tabLoading[tab] = true;
  showSkel();
  updCounter('Loading news…', 0);

  const today = new Date().toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'});

  const IND = `You are editor of REPower News. Today: ${today}.

Generate 20 INDUSTRY & BUSINESS renewable energy news articles.
Topics: government policy, SECI/MNRE tenders, capacity auctions, project commissioning, company investments, financing deals, PPAs, tariff orders, regulatory approvals, M&A, IPO.
India companies: Adani Green, NTPC Renewable, ReNew Power, Tata Power Solar, Greenko, Torrent Power, JSW Energy, Azure Power, Acme Solar.
Global companies: Orsted, Vestas, Siemens Gamesa, Shell, BP, Equinor, RWE, Enel, NextEra Energy, Iberdrola.
Mix 10 India + 10 global articles. Each article must cover a COMPLETELY DIFFERENT company/topic/project.

Return ONLY a JSON array. Each item has these exact keys:
headline, summary, source, url, category, region, validity, validityReason, timeAgo

Rules:
- headline: max 12 words
- summary: 75-85 words. Start with company name + key fact. Include MW/GW, ₹crore or $billion amounts, location, timeline, significance.
- source: one of Economic Times|Business Standard|Livemint|Financial Express|Reuters|Bloomberg|The Hindu|Times of India|NDTV|Hindustan Times|Mercom India|PV Magazine|Financial Times|AP News
- url: realistic URL from that source
- category: one of Solar Tender|Wind Auction|Green Finance|Project Commission|Policy Update|Power Trading|M&A Deal|Offshore Wind|Grid Expansion|Rooftop Solar
- region: India or Global or Europe or US or Southeast Asia or Middle East
- validity: 8
- validityReason: Industry publication cited
- timeAgo: 1h ago to 20h ago

Return valid JSON array only. No markdown. No extra text:`;

  const TECH = `You are editor of REPower News. Today: ${today}.

Generate 20 TECHNOLOGY & INNOVATION renewable energy articles.
Cover 20 completely different topics from: perovskite solar cells, solid-state batteries, sodium-ion batteries, green hydrogen electrolyzers, floating offshore wind, iron-air long-duration storage, AI in grid management, building-integrated PV, agrivoltaics, wave energy, vehicle-to-grid, virtual power plants, compressed air storage, green ammonia.
Institutions: NREL, MIT, IIT, Fraunhofer, Tesla Energy, QuantumScape, Northvolt, Form Energy, Nel Hydrogen, ITM Power, LONGi, Siemens Energy.

Return ONLY a JSON array. Each item has these exact keys:
headline, summary, source, url, category, region, validity, validityReason, timeAgo

Rules:
- headline: max 12 words
- summary: 75-85 words. Start with institution/company + breakthrough. Include efficiency %, cost/kWh, improvement %, commercialisation timeline, real-world impact.
- source: one of CleanTechnica|Electrek|PV Magazine|IRENA|IEA|Solar Power World|Green Tech Media|Bloomberg NEF|MIT Technology Review|Nature Energy|Science Daily|Wood Mackenzie|Canary Media|RE World
- url: realistic URL from that source
- category: one of Solar Tech|Battery Innovation|Green Hydrogen|Offshore Wind Tech|Grid Technology|EV Technology|Energy Storage|Carbon Tech|Smart Grid|Agrivoltaics|Wave Energy|Building Solar
- region: Global or Europe or US or India or Asia
- validity: 8
- validityReason: Research institution data
- timeAgo: 2h ago to 22h ago

Return valid JSON array only. No markdown. No extra text:`;

  try {
    const res = await fetch(GROQ_URL, {
      method: 'POST',
      headers: {'Authorization':`Bearer ${GROQ_KEY}`,'Content-Type':'application/json'},
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [{role:'user', content: tab==='industry' ? IND : TECH}],
        temperature: 0.75,
        max_tokens: 10000,
      }),
    });

    if (res.status === 401) throw new Error('Invalid Groq API key. Please update the key in the code.');
    if (res.status === 429) throw new Error('Rate limit reached. Wait 30 seconds and refresh.');
    if (!res.ok)            throw new Error(`Groq API error ${res.status}`);

    const data   = await res.json();
    const text   = data.choices?.[0]?.message?.content || '';
    const parsed = safeJSON(text);
    if (!parsed?.length) throw new Error('AI response could not be parsed. Please refresh.');

    cache[tab] = {data: parsed, ts: Date.now()};
    arts = parsed;
    curIdx = 0;
    showCardAt(0, 'enter-down', 'news');
    updCounter(`1 of ${arts.length}`, 0);
    $prev.disabled = true;
    $next.disabled = arts.length <= 1;
    showToast('✅ News updated');

  } catch(err) {
    console.error(tab, err);
    showError(err.message);
  } finally {
    tabLoading[tab] = false;
  }
}

// ── Load learning ─────────────────────────────────────────
async function loadLearn(append) {
  if (tabLoading['learn']) return;
  tabLoading['learn'] = true;

  if (!append) {
    showSkel();
    updCounter('Generating learning cards…', 0);
  } else {
    updCounter('Loading more topics…', curIdx);
  }

  const ALL_TOPICS = [
    'How solar PV panels convert sunlight into electricity using the photoelectric effect',
    'How wind turbines work — rotor aerodynamics, gearbox, generator, pitch control',
    'How lithium-ion battery storage works — charging cycles, BMS, grid applications',
    'How the electricity grid works — frequency regulation, transmission, load balancing',
    'Green hydrogen production using electrolysis — PEM vs alkaline electrolyzers',
    'How offshore wind farms are designed, installed and connected to shore',
    'What is a Power Purchase Agreement (PPA) and how it works in India',
    'How electric vehicles work — motors, regenerative braking, charging levels',
    'What are perovskite solar cells and why they are the next big thing in solar',
    'How agrivoltaics combines solar panels with farming for dual land use',
    'What is vehicle-to-grid (V2G) technology and how EVs stabilise the grid',
    'How pumped hydro storage works — the world oldest grid-scale battery',
    'What is net metering and how rooftop solar owners earn from surplus power',
    'Understanding capacity factor — why actual solar and wind output varies',
    'How smart meters and demand response help balance renewable energy grids',
    'What is India ISTS waiver and why it made solar and wind cheaper',
    'How bifacial solar panels generate power from both sides',
    'What is green ammonia and its role in shipping and fertiliser decarbonisation',
    'How microgrids provide energy independence to villages and islands',
    'Understanding India Renewable Purchase Obligation (RPO) targets',
    'How solid-state batteries improve on lithium-ion safety and energy density',
    'What is a BESS — Battery Energy Storage System — and how it helps the grid',
    'How floating solar farms work on water bodies and why they are efficient',
    'Understanding the duck curve — why solar power creates a grid challenge at sunset',
    'What is green steel and how hydrogen replaces coal in blast furnaces',
    'How tidal stream turbines capture predictable ocean energy',
    'What is direct air carbon capture and how it combines with renewable energy',
    'How virtual power plants aggregate millions of small energy sources with AI',
    'What is compressed air energy storage and how large caves store electricity',
    'Understanding India National Green Hydrogen Mission targets and incentives',
  ];

  const unused = ALL_TOPICS.filter(t => !learnUsed.includes(t));
  if (unused.length < 5) learnUsed = []; // reset when exhausted
  const pool = unused.length > 0 ? unused : ALL_TOPICS;
  const chosen = [...pool].sort(() => Math.random()-0.5).slice(0,6);
  learnUsed.push(...chosen);

  const LEARN = `You are a renewable energy educator for REPower News app.

Create 6 learning cards, one for each topic below:
${chosen.map((t,i)=>`${i+1}. ${t}`).join('\n')}

Return ONLY a valid JSON array. Each item must have these exact keys:
title, category, difficulty, intro, point1, point2, point3, stats, readUrl, readLabel

Rules:
- title: clear educational title max 10 words
- category: one of Solar Energy|Wind Energy|Battery Storage|Grid & Systems|Hydrogen|EV & Transport|Ocean Energy|Energy Policy
- difficulty: exactly one of Beginner or Intermediate or Advanced
- intro: 65-75 word engaging introduction explaining why this topic matters for energy transition
- point1: object with keys "heading" (emoji + title) and "text" (55-65 words of explanation, use analogies)
- point2: object with keys "heading" (emoji + title) and "text" (55-65 words, build on point1)
- point3: object with keys "heading" (emoji + title) and "text" (55-65 words, include India-specific context)
- stats: array of 4 short fact strings including India data e.g. "India: 90 GW solar (2024)"
- readUrl: real URL from IRENA, IEA, MNRE, NREL, or reputable institution
- readLabel: short text like "Explore at IRENA"

Return valid JSON array only. No markdown. No extra text:`;

  try {
    const res = await fetch(GROQ_URL, {
      method: 'POST',
      headers: {'Authorization':`Bearer ${GROQ_KEY}`,'Content-Type':'application/json'},
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [{role:'user', content: LEARN}],
        temperature: 0.7,
        max_tokens: 6000,
      }),
    });

    if (res.status === 401) throw new Error('Invalid Groq API key. Please update the key in the code.');
    if (res.status === 429) throw new Error('Rate limit. Wait 30 seconds and refresh.');
    if (!res.ok)            throw new Error(`Groq API error ${res.status}`);

    const data   = await res.json();
    const text   = data.choices?.[0]?.message?.content || '';
    const parsed = safeJSON(text);
    if (!parsed?.length) throw new Error('Could not parse learning content. Please refresh.');

    if (append) {
      learnArts = [...learnArts, ...parsed];
      curIdx    = learnArts.length - parsed.length;
    } else {
      learnArts = parsed;
      curIdx    = 0;
    }
    arts = learnArts;

    showCardAt(curIdx, 'enter-down', 'learn');
    updCounter(`${curIdx+1} of ${arts.length}`, curIdx);
    $prev.disabled = curIdx === 0;
    $next.disabled = false;
    showToast(`✅ ${parsed.length} new learning cards ready`);

  } catch(err) {
    console.error('learn', err);
    showError(err.message);
  } finally {
    tabLoading['learn'] = false;
  }
}

// ── Navigation ────────────────────────────────────────────
function nav(dir) {
  const nxt = curIdx + dir;

  // Learning: show load-more at the end
  if (curTab === 'learn' && nxt >= arts.length) {
    animateOut(dir);
    showLoadMore();
    return;
  }
  if (nxt < 0 || nxt >= arts.length) return;

  const type = curTab === 'learn' ? 'learn' : 'news';
  animateOut(dir);
  curIdx = nxt;
  showCardAt(curIdx, dir > 0 ? 'enter-down' : 'enter-up', type);
  updCounter(`${curIdx+1} of ${arts.length}`, curIdx);
  $prev.disabled = curIdx === 0;
  $next.disabled = curTab !== 'learn' && curIdx === arts.length-1;
}

function animateOut(dir) {
  const old = $wrap.querySelector('.card.active, .loadmore.active');
  if (!old) return;
  old.classList.remove('active');
  old.classList.add(dir > 0 ? 'exit-up' : 'exit-down');
  setTimeout(() => old.remove(), 420);
}

// ── Show card ─────────────────────────────────────────────
function showCardAt(idx, from, type) {
  // Remove old skeleton/error
  const sk = $wrap.querySelector('.sk-card, .err-card, .file-warn');
  if (sk) sk.remove();

  if (type === 'learn') buildLearnCard(arts[idx], idx, from);
  else                  buildNewsCard(arts[idx], idx, from);
}

function buildNewsCard(a, idx, from) {
  if (!a) return;
  const v   = Number(a.validity) || 7;
  const vc  = v >= 8 ? 'vhi' : 'vmd';
  const vt  = v >= 8 ? `Verified · ${v}/10` : `Moderate · ${v}/10`;
  const img = getImgUrl(a.category, idx);

  const card = document.createElement('div');
  card.className = `card ${from}`;
  card.innerHTML = `
    <div class="card-img">
      <img src="${img}" alt="${x(a.category)}"
        onload="this.classList.add('vis')"
        onerror="this.src='https://images.unsplash.com/photo-1509391366360-2e959784a276?w=900&h=500&fit=crop'">
      <div class="img-grad"></div>
      <div class="badge-cat">${x(a.category)}</div>
      <div class="badge-src">${x(a.source)}</div>
      <div class="badge-meta">
        <span>${x(a.region)}</span>
        <span>${x(a.timeAgo)}</span>
      </div>
    </div>
    <div class="card-body">
      <div class="c-headline">${x(a.headline)}</div>
      <div class="c-summary">${x(a.summary)}</div>
      ${a.url ? `<a href="${x(a.url)}" target="_blank" rel="noopener" class="btn-read">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Read full article
      </a>` : ''}
      <div class="c-foot">
        <div class="vbadge ${vc}"><div class="vdot"></div>${vt}</div>
        <div class="swipe-hint">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          Swipe or use arrows
        </div>
      </div>
    </div>`;
  $wrap.appendChild(card);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.replace(from, 'active')));
}

function buildLearnCard(a, idx, from) {
  if (!a) return;
  const dc  = a.difficulty === 'Advanced' ? 'diff-adv' : a.difficulty === 'Intermediate' ? 'diff-int' : 'diff-beg';
  const img = getImgUrl(a.category, idx + 500);
  const p1  = a.point1 || {};
  const p2  = a.point2 || {};
  const p3  = a.point3 || {};
  const stats = Array.isArray(a.stats) ? a.stats : [];

  const card = document.createElement('div');
  card.className = `card ${from}`;
  card.innerHTML = `
    <div class="card-img">
      <img src="${img}" alt="${x(a.category)}"
        onload="this.classList.add('vis')"
        onerror="this.src='https://images.unsplash.com/photo-1466611653911-95081537e5b7?w=900&h=500&fit=crop'">
      <div class="img-grad"></div>
      <div class="badge-cat">${x(a.category)}</div>
      <div class="badge-src">Learning Tech</div>
      <div class="badge-diff ${dc}">${x(a.difficulty)}</div>
    </div>
    <div class="card-body">
      <div class="c-headline">${x(a.title)}</div>
      <div class="c-summary">${x(a.intro)}</div>
      ${p1.heading ? `<div class="cblock"><div class="cblock-title">${x(p1.heading)}</div><div class="cblock-text">${x(p1.text)}</div></div>` : ''}
      ${p2.heading ? `<div class="cblock"><div class="cblock-title">${x(p2.heading)}</div><div class="cblock-text">${x(p2.text)}</div></div>` : ''}
      ${p3.heading ? `<div class="cblock"><div class="cblock-title">${x(p3.heading)}</div><div class="cblock-text">${x(p3.text)}</div></div>` : ''}
      ${stats.length ? `<div class="stats-row">${stats.map(s=>`<span class="stat-chip">${x(s)}</span>`).join('')}</div>` : ''}
      ${a.readUrl ? `<a href="${x(a.readUrl)}" target="_blank" rel="noopener" class="btn-read">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        ${x(a.readLabel || 'Learn more')}
      </a>` : ''}
      <div class="c-foot">
        <div class="vbadge vhi"><div class="vdot"></div>AI Generated</div>
        <div class="swipe-hint">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          Swipe for more
        </div>
      </div>
    </div>`;
  $wrap.appendChild(card);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.replace(from, 'active')));
}

function showLoadMore() {
  const el = document.createElement('div');
  el.className = 'loadmore enter-down';
  el.innerHTML = `
    <div class="lm-emoji">📚</div>
    <div class="lm-title">You've read all ${arts.length} cards!</div>
    <div class="lm-sub">Tap below to generate 6 more learning cards on new topics</div>
    <button class="lm-btn" onclick="loadLearn(true)">Load More Topics →</button>`;
  $wrap.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.replace('enter-down','active')));
  updCounter(`All ${arts.length} read · load more below`, arts.length-1);
  $prev.disabled = false;
  $next.disabled = true;
}

function showSkel() {
  $wrap.innerHTML = `
    <div class="sk-card">
      <div class="sk-img"></div>
      <div class="sk-body">
        <div class="sk-line sk-s"></div>
        <div class="sk-line sk-l"></div>
        <div class="sk-line sk-xl"></div>
        <div class="sk-line sk-m"></div>
        <div class="sk-line sk-l"></div>
      </div>
    </div>`;
  $prev.disabled = true; $next.disabled = true;
}

function showError(msg) {
  $wrap.innerHTML = `
    <div class="err-card">
      <div class="err-emoji">⚠️</div>
      <div class="err-title">Could not load content</div>
      <div class="err-msg">${x(msg)}</div>
      <button class="err-retry" onclick="retryLoad()">Try Again</button>
    </div>`;
  updCounter('Error — tap Try Again', 0);
  $prev.disabled = true; $next.disabled = true;
}

function showFileWarning() {
  $wrap.innerHTML = `
    <div class="file-warn">
      <div style="font-size:38px">⚠️</div>
      <h3>Cannot run from desktop</h3>
      <p>
        This app makes API calls that browsers block when opening directly from your computer.<br><br>
        <strong>Upload to GitHub Pages and open that URL instead:</strong><br><br>
        Your app URL should look like:<br>
        <code>https://yourname.github.io/repower-news</code>
      </p>
    </div>`;
  updCounter('Please use GitHub Pages URL', 0);
}

function retryLoad() {
  if (curTab === 'learn') loadLearn(false);
  else { delete cache[curTab]; loadTab(curTab); }
}

// ── Helpers ───────────────────────────────────────────────
function updCounter(txt, idx) {
  $cText.textContent = txt;
  $cDots.innerHTML   = '';
  const total = Math.min(arts.length, 10);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = `cdot${i === idx ? ' on' : ''}`;
    $cDots.appendChild(d);
  }
}

function safeJSON(t) {
  const attempts = [
    () => JSON.parse(t.trim()),
    () => JSON.parse(t.replace(/```json|```/g,'').trim()),
    () => { const m = t.match(/\[[\s\S]*\]/); if (m) return JSON.parse(m[0]); throw 0; },
  ];
  for (const fn of attempts) { try { return fn(); } catch {} }
  return null;
}

function showToast(m, ms=2500) {
  $toast.textContent = m;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), ms);
}

function x(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
